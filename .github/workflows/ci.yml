name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DB_URL: postgresql://jtrack:${{ secrets.DB_PASSWORD }}@localhost:5432/jtrack
  REDIS_URL: redis://localhost:6379
  KAFKA_BROKER: localhost:9092
  UTILS_SERVICE_URL: http://localhost:6001/api/utils
  FRONTEND_URL: http://localhost:3000
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}

jobs:
  infra-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy env file for validation
        run: touch .env

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config

      - name: Validate prod docker-compose syntax
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Create dummy SSL certs for nginx validation
        run: |
          mkdir -p nginx/ssl
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout nginx/ssl/privkey.pem \
            -out nginx/ssl/fullchain.pem \
            -subj "/CN=localhost" 2>/dev/null

      - name: Validate nginx prod config
        run: |
          docker run --rm \
            --add-host auth:127.0.0.1 \
            --add-host user:127.0.0.1 \
            --add-host jobservice:127.0.0.1 \
            --add-host utils:127.0.0.1 \
            -v $PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v $PWD/nginx/prod/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro \
            -v $PWD/nginx/ssl:/etc/nginx/ssl:ro \
            nginx:1.27-alpine nginx -t

  changes:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.filter.outputs.any }}
      services: ${{ steps.set-matrix.outputs.services }}
      e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth/**'
              - 'packages/shared/**'
            user:
              - 'services/user/**'
              - 'packages/shared/**'
            jobservice:
              - 'services/jobservice/**'
              - 'packages/shared/**'
            utils:
              - 'services/utils/**'
              - 'packages/shared/**'
            any:
              - 'services/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
              - 'eslint.config.js'
              - '.github/workflows/**'
              - 'docker-compose*.yml'
            e2e:
              - 'e2e/**'
              - 'services/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          services='[]'
          if [[ '${{ steps.filter.outputs.auth }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["auth"]')
          fi
          if [[ '${{ steps.filter.outputs.user }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["user"]')
          fi
          if [[ '${{ steps.filter.outputs.jobservice }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["jobservice"]')
          fi
          if [[ '${{ steps.filter.outputs.utils }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["utils"]')
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Policy: moderate/low vulnerabilities tracked by Dependabot (see .github/dependabot.yml)
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  build:
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jtrack
          POSTGRES_USER: jtrack
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build ${{ matrix.service }}
        run: pnpm --filter ${{ matrix.service }} build
      - name: Lint ${{ matrix.service }}
        run: pnpm --filter ${{ matrix.service }} lint
      - name: Type-check ${{ matrix.service }}
        run: pnpm --filter ${{ matrix.service }} exec tsc --noEmit
      - name: Test ${{ matrix.service }}
        run: pnpm --filter ${{ matrix.service }} test -- --run --coverage
      - if: always()
        name: Upload coverage ${{ matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  smoke-e2e:
    if: needs.changes.outputs.e2e == 'true'
    needs: [changes, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jtrack
          POSTGRES_USER: jtrack
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: apache/kafka:4.2.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build all services
        run: pnpm -r --filter auth --filter user --filter jobservice --filter utils build
      - name: Start all services in background
        run: |
          node services/auth/dist/index.js &
          node services/user/dist/index.js &
          node services/jobservice/dist/index.js &
          node services/utils/dist/index.js &
          sleep 4
      - name: Wait for services to be ready
        run: |
          for port in 7000 7001 7002 6001; do
            for i in $(seq 1 30); do
              resp=$(curl -sf "http://localhost:$port/health" 2>&1)
              if [ $? -eq 0 ]; then
                echo "✓ Service on port $port ready"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "✗ Service on port $port failed to start after 60s"
                echo "  Last response: $resp"
                exit 1
              fi
              echo "  Waiting for port $port (attempt $i/30)..."
              sleep 2
            done
          done
      - name: Run smoke e2e test
        run: pnpm --filter e2e exec vitest run src/smoke.test.ts

  docker-build:
    needs: [changes, build]
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jtrack
          POSTGRES_USER: jtrack
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: apache/kafka:4.2.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image with layer cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          load: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.service }}:cache,mode=max

      - name: Smoke test
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}"
          echo "Starting container..."
          CID=$(docker run -d --network host \
            -e DB_URL="$DB_URL" \
            -e REDIS_URL="$REDIS_URL" \
            -e KAFKA_BROKER="$KAFKA_BROKER" \
            -e JWT_ACCESS_SECRET="$JWT_ACCESS_SECRET" \
            -e JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET" \
            -e JWT_RESET_SECRET="$JWT_RESET_SECRET" \
            -e UTILS_SERVICE_URL="$UTILS_SERVICE_URL" \
            -e FRONTEND_URL="$FRONTEND_URL" \
            "$IMAGE")
          for i in $(seq 1 10); do
            sleep 2
            RUNNING=$(docker inspect --format='{{.State.Running}}' "$CID" 2>/dev/null || echo "false")
            if [[ "$RUNNING" == "true" ]]; then
              echo "✓ Container running after $(( i * 2 ))s"
              docker stop "$CID" > /dev/null 2>&1 || true
              docker rm "$CID" > /dev/null 2>&1 || true
              exit 0
            fi
            if ! docker inspect "$CID" > /dev/null 2>&1; then
              echo "::error::Container exited before smoke check"
              docker logs "$CID" 2>&1 || true
              docker rm "$CID" > /dev/null 2>&1 || true
              exit 1
            fi
            echo "  Waiting... ($(( i * 2 ))s)"
          done
          echo "::error::Container not running after 20s"
          docker logs "$CID" 2>&1 || true
          docker stop "$CID" > /dev/null 2>&1 || true
          docker rm "$CID" > /dev/null 2>&1 || true
          exit 1

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push to registry
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service }}"
          docker push "$IMAGE:${{ github.sha }}"

  ci-passed:
    if: always()
    needs:
      - infra-check
      - audit
      - build
      - smoke-e2e
      - docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          failed=""
          check() {
            local name="$1" result="$2"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::$name: $result"
              failed="$failed $name"
            fi
          }
          check infra-check "${{ needs.infra-check.result }}"
          check audit "${{ needs.audit.result }}"
          check build "${{ needs.build.result }}"
          check smoke-e2e "${{ needs.smoke-e2e.result }}"
          check docker-build "${{ needs.docker-build.result }}"
          if [[ -n "$failed" ]]; then
            echo "CI failed on:$failed"
            exit 1
          fi
          echo "CI passed"
