name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DB_URL: postgresql://jtrack:${{ secrets.DB_PASSWORD }}@localhost:5432/jtrack
  REDIS_URL: redis://localhost:6379
  KAFKA_BROKER: localhost:9092
  UTILS_SERVICE_URL: http://localhost:6001/api/utils
  FRONTEND_URL: http://localhost:3000
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth/**'
              - 'packages/shared/**'
            user:
              - 'services/user/**'
              - 'packages/shared/**'
            jobservice:
              - 'services/jobservice/**'
              - 'packages/shared/**'
            utils:
              - 'services/utils/**'
              - 'packages/shared/**'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          services='[]'
          if [[ '${{ steps.filter.outputs.auth }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["auth"]')
          fi
          if [[ '${{ steps.filter.outputs.user }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["user"]')
          fi
          if [[ '${{ steps.filter.outputs.jobservice }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["jobservice"]')
          fi
          if [[ '${{ steps.filter.outputs.utils }}' == 'true' ]]; then
            services=$(echo "$services" | jq -c '. + ["utils"]')
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"

  docker-build:
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jtrack
          POSTGRES_USER: jtrack
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: apache/kafka:4.2.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase registry
        id: reg
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          tags: |
            ${{ steps.reg.outputs.base }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.reg.outputs.base }}/${{ matrix.service }}:latest
          push: true
          cache-from: type=registry,ref=${{ steps.reg.outputs.base }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ steps.reg.outputs.base }}/${{ matrix.service }}:cache,mode=max

      - name: Smoke test container
        run: |
          IMAGE="${{ steps.reg.outputs.base }}/${{ matrix.service }}:${{ github.sha }}"
          docker pull "$IMAGE"
          echo "Starting container..."
          CID=$(docker run -d --network host \
            -e "DB_URL=$DB_URL" \
            -e "REDIS_URL=$REDIS_URL" \
            -e "KAFKA_BROKER=$KAFKA_BROKER" \
            -e "JWT_ACCESS_SECRET=$JWT_ACCESS_SECRET" \
            -e "JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET" \
            -e "JWT_RESET_SECRET=$JWT_RESET_SECRET" \
            -e "UTILS_SERVICE_URL=$UTILS_SERVICE_URL" \
            -e "FRONTEND_URL=$FRONTEND_URL" \
            "$IMAGE")
          for i in $(seq 1 10); do
            sleep 2
            RUNNING=$(docker inspect --format='{{.State.Running}}' "$CID" 2>/dev/null || echo "false")
            if [[ "$RUNNING" == "true" ]]; then
              echo "✓ Container running after $(( i * 2 ))s"
              docker stop "$CID" > /dev/null 2>&1 || true
              docker rm "$CID" > /dev/null 2>&1 || true
              exit 0
            fi
            if ! docker inspect "$CID" > /dev/null 2>&1; then
              echo "::error::Container exited before smoke check"
              docker logs "$CID" 2>&1 || true
              docker rm "$CID" > /dev/null 2>&1 || true
              exit 1
            fi
            echo "  Waiting... ($(( i * 2 ))s)"
          done
          echo "::error::Container not running after 20s"
          docker logs "$CID" 2>&1 || true
          docker stop "$CID" > /dev/null 2>&1 || true
          docker rm "$CID" > /dev/null 2>&1 || true
          exit 1

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.reg.outputs.base }}/${{ matrix.service }}:${{ github.sha }}
          exit-code: 0
          severity: CRITICAL,HIGH
