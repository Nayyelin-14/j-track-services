name: E2E Full Suite

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DB_URL: postgresql://jtrack:${{ secrets.DB_PASSWORD }}@localhost:5432/jtrack
  REDIS_URL: redis://localhost:6379
  KAFKA_BROKER: localhost:9092
  UTILS_SERVICE_URL: http://localhost:6001/api/utils
  FRONTEND_URL: http://localhost:3000
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}

jobs:
  full-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jtrack
          POSTGRES_USER: jtrack
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: apache/kafka:4.2.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build all services
        run: pnpm -r --filter auth --filter user --filter jobservice --filter utils build
      - name: Start all services in background
        run: |
          node services/auth/dist/index.js &
          node services/user/dist/index.js &
          node services/jobservice/dist/index.js &
          node services/utils/dist/index.js &
          sleep 4
      - name: Wait for services to be ready
        run: |
          for port in 7000 7001 7002 6001; do
            for i in $(seq 1 30); do
              resp=$(curl -sf "http://localhost:$port/health" 2>&1)
              if [ $? -eq 0 ]; then
                echo "✓ Service on port $port ready"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "✗ Service on port $port failed to start after 60s"
                echo "  Last response: $resp"
                exit 1
              fi
              echo "  Waiting for port $port (attempt $i/30)..."
              sleep 2
            done
          done
      - name: Run full e2e suite
        run: pnpm --filter e2e test
