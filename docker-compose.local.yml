# Nginx-only in Docker, proxies to services running natively on host.
# Run `pnpm dev` in another terminal, then `docker compose -f docker-compose.local.yml up`.
# On Linux, extra_hosts is needed for host.docker.internal to resolve.

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: jtrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
