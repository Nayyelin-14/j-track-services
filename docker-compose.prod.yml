# Production deployment.
# Services are pre-built by CI and pushed to GHCR.
# Set GHCR_REPO env var or replace ghcr.io/your-org/your-repo below.

services:
  redis:
    image: redis:7-alpine
    container_name: jtrack-redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.2.0
    container_name: jtrack-kafka
    restart: unless-stopped
    expose:
      - "9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kafka-logs
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  auth:
    image: ${GHCR_REPO:-ghcr.io/your-org/your-repo}/auth:latest
    container_name: jtrack-auth
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 7000
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      UTILS_SERVICE_URL: http://utils:6001/api/utils

  user:
    image: ${GHCR_REPO:-ghcr.io/your-org/your-repo}/user:latest
    container_name: jtrack-user
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 7001
      REDIS_URL: redis://redis:6379
      UTILS_SERVICE_URL: http://utils:6001/api/utils

  jobservice:
    image: ${GHCR_REPO:-ghcr.io/your-org/your-repo}/jobservice:latest
    container_name: jtrack-job
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 7002
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      UTILS_SERVICE_URL: http://utils:6001/api/utils

  utils:
    image: ${GHCR_REPO:-ghcr.io/your-org/your-repo}/utils:latest
    container_name: jtrack-utils
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    env_file: .env
    environment:
      PORT: 6001
      KAFKA_BROKER: kafka:9092

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    container_name: jtrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./nginx/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - auth
      - user
      - jobservice
      - utils
