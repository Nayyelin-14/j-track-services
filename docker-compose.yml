services:
  postgres:
    image: postgres:15
    container_name: jtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jtrack
      POSTGRES_USER: jtrack
      POSTGRES_PASSWORD: jtrack123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jtrack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.2.0
    container_name: jtrack-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kafka-logs
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: jtrack-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "7000:7000"
    env_file: .env
    environment:
      PORT: 7000
      DB_URL: postgresql://jtrack:jtrack123@postgres:5432/jtrack
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      UTILS_SERVICE_URL: http://utils:6001/api/utils

  user:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: jtrack-user
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "7001:7001"
    env_file: .env
    environment:
      PORT: 7001
      DB_URL: postgresql://jtrack:jtrack123@postgres:5432/jtrack
      REDIS_URL: redis://redis:6379
      UTILS_SERVICE_URL: http://utils:6001/api/utils

  jobservice:
    build:
      context: .
      dockerfile: services/jobservice/Dockerfile
    container_name: jtrack-job
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "7002:7002"
    env_file: .env
    environment:
      PORT: 7002
      DB_URL: postgresql://jtrack:jtrack123@postgres:5432/jtrack
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      UTILS_SERVICE_URL: http://utils:6001/api/utils

  utils:
    build:
      context: .
      dockerfile: services/utils/Dockerfile
    container_name: jtrack-utils
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "6001:6001"
    env_file: .env
    environment:
      PORT: 6001
      KAFKA_BROKER: kafka:9092

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jtrack-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: jtrack
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: jtrack-kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: jtrack-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379

  prometheus:
    image: prom/prometheus:latest
    container_name: jtrack-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - kafka-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: jtrack-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  utils-dev:
    build:
      context: .
      dockerfile: services/utils/Dockerfile
      target: base
    container_name: jtrack-utils-dev
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./services/utils:/app/services/utils
    env_file: .env
    environment:
      PORT: 6001
      KAFKA_BROKER: kafka:9092
    command: sh -c "pnpm build:shared && pnpm --filter utils dev"
    ports:
      - "6001:6001"
    depends_on:
      kafka:
        condition: service_started

  auth-dev:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
      target: base
    container_name: jtrack-auth-dev
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./services/auth:/app/services/auth
    env_file: .env
    environment:
      PORT: 7000
      DB_URL: postgresql://jtrack:jtrack123@postgres:5432/jtrack
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      UTILS_SERVICE_URL: http://utils:6001/api/utils
    command: sh -c "pnpm build:shared && pnpm --filter auth dev"
    ports:
      - "7000:7000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-dev:
    build:
      context: .
      dockerfile: services/user/Dockerfile
      target: base
    container_name: jtrack-user-dev
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./services/user:/app/services/user
    env_file: .env
    environment:
      PORT: 7001
      DB_URL: postgresql://jtrack:jtrack123@postgres:5432/jtrack
      REDIS_URL: redis://redis:6379
      UTILS_SERVICE_URL: http://utils:6001/api/utils
    command: sh -c "pnpm build:shared && pnpm --filter user dev"
    ports:
      - "7001:7001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  jobservice-dev:
    build:
      context: .
      dockerfile: services/jobservice/Dockerfile
      target: base
    container_name: jtrack-job-dev
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./services/jobservice:/app/services/jobservice
    env_file: .env
    environment:
      PORT: 7002
      DB_URL: postgresql://jtrack:jtrack123@postgres:5432/jtrack
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      UTILS_SERVICE_URL: http://utils:6001/api/utils
    command: sh -c "pnpm build:shared && pnpm --filter jobservice dev"
    ports:
      - "7002:7002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata:
