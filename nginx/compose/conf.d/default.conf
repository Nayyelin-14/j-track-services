server {
    listen 80;
    server_name localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location = /api/auth/health {
        proxy_pass http://auth:7000/health;
    }
    location = /api/users/health {
        proxy_pass http://user:7001/health;
    }
    location = /api/jobs/health {
        proxy_pass http://jobservice:7002/health;
    }
    location = /api/utils/health {
        proxy_pass http://utils:6001/health;
    }

    location /api/auth/ {
        proxy_pass http://auth:7000;
    }

    location /api/users/ {
        proxy_pass http://user:7001;
    }

    location /api/jobs/ {
        proxy_pass http://jobservice:7002;
    }

    location /api/jobs/analyze-match/ {
        proxy_pass http://jobservice:7002;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location /api/utils/ {
        client_max_body_size 50m;
        proxy_pass http://utils:6001;
    }
}
