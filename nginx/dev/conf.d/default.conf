# Development server
# HTTP only. Upstreams point to dev services (auth-dev, user-dev, etc.)
# for hot-reload support. Access at http://localhost

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Health (nginx-level, no backend dependency)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /api/auth/ {
        proxy_pass http://auth-dev:7000;
    }

    location /api/users/ {
        proxy_pass http://user-dev:7001;
    }

    location /api/jobs/ {
        proxy_pass http://jobservice-dev:7002;
    }

    # SSE endpoint — disable buffering so stream isn't delayed
    location /api/jobs/analyze-match/ {
        proxy_pass http://jobservice-dev:7002;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location /api/utils/ {
        client_max_body_size 50m;
        proxy_pass http://utils-dev:6001;
    }
}
