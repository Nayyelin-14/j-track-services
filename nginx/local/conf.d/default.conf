# Local dev nginx config (no Docker, nginx installed natively)
# Proxies to services running via `pnpm dev` on localhost ports.
# Copy to /etc/nginx/sites-available/default (Ubuntu/Debian) or
# /etc/nginx/conf.d/default.conf (Alpine/arch) and restart nginx.

server {
    listen 80;
    server_name localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Health
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Auth service
    location /api/auth/ {
        proxy_pass http://localhost:7000;
    }

    # User service
    location /api/users/ {
        proxy_pass http://localhost:7001;
    }

    # Job service
    location /api/jobs/ {
        proxy_pass http://localhost:7002;
    }

    # Utils service (file uploads need larger body size)
    location /api/utils/ {
        client_max_body_size 50m;
        proxy_pass http://localhost:6001;
    }

    # SSE endpoint — disable buffering
    location /api/jobs/analyze-match/ {
        proxy_pass http://localhost:7002;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
