user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    multi_accept on;
    use epoll;
    worker_connections 1024;
}


# /////////////////////////////////
# how to handle request 
http { 
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # JSON logging
    log_format json escape=json '{'
        '"time":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":"$request_time",'
        '"referrer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"upstream":"$upstream_addr",'
        '"upstream_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;

    # Timeouts
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    reset_timedout_connection on;

    # Body size (resume/profile_pic uploads)
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # Rate limit zones (shared across server blocks)
    limit_req_zone $binary_remote_addr zone=r_login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=r_register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=r_forgot:10m   rate=3r/m;
    limit_req_zone $binary_remote_addr zone=r_apply:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=r_general:10m  rate=100r/m;

    # DNS resolver for Docker
    # Enables runtime re-resolution so nginx picks up
    # container restarts without a reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;

    # Upstreams (production load balancing)
    upstream auth-service {
        zone auth-service 64k;
        least_conn;
        server auth:7000 max_fails=3 fail_timeout=30s resolve;
    }

    upstream user-service {
        zone user-service 64k;
        least_conn;
        server user:7001 max_fails=3 fail_timeout=30s resolve;
    } 

    upstream job-service {
        zone job-service 64k;
        least_conn;
        server jobservice:7002 max_fails=3 fail_timeout=30s resolve;
    }

    upstream utils-service {
        zone utils-service 64k;
        least_conn;
        server utils:6001 max_fails=3 fail_timeout=30s resolve;
    }

    include /etc/nginx/conf.d/*.conf;
}
