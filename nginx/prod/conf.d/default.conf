# Production server
# HTTPS + HTTP redirect + rate limiting + hardened headers.
# Replace jtrack.example.com with your domain before deploying.

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name jtrack.example.com;

    location / {
        return 301 https://$host$request_uri;
    }

    # Let ACME challenges through for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name jtrack.example.com;

    # TLS
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Health (nginx-level, no backend needed)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Backend health endpoints
    location = /api/auth/health {
        proxy_pass http://auth-service/health;
    }
    location = /api/users/health {
        proxy_pass http://user-service/health;
    }
    location = /api/jobs/health {
        proxy_pass http://job-service/health;
    }
    location = /api/utils/health {
        proxy_pass http://utils-service/health;
    }

    # Auth Service
    location /api/auth/ {
        limit_req zone=r_general burst=20 nodelay;
        proxy_pass http://auth-service;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Stricter rate limit on login
    location = /api/auth/login {
        limit_req zone=r_login burst=5 nodelay;
        proxy_pass http://auth-service;
    }

    # Stricter rate limit on register
    location = /api/auth/register {
        limit_req zone=r_register burst=3 nodelay;
        proxy_pass http://auth-service;
    }

    # Stricter rate limit on forgot password
    location = /api/auth/forgot-password {
        limit_req zone=r_forgot burst=3 nodelay;
        proxy_pass http://auth-service;
    }

    # User Service
    location /api/users/ {
        limit_req zone=r_general burst=20 nodelay;
        proxy_pass http://user-service;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Job Service
    location /api/jobs/ {
        limit_req zone=r_general burst=20 nodelay;
        proxy_pass http://job-service;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Stricter rate limit on apply
    location = /api/jobs/apply {
        limit_req zone=r_apply burst=5 nodelay;
        proxy_pass http://job-service;
    }

    # SSE — disable buffering so stream isn't delayed
    location /api/jobs/analyze-match/ {
        limit_req zone=r_general burst=10 nodelay;
        proxy_pass http://job-service;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Utils Service
    location /api/utils/ {
        limit_req zone=r_general burst=10 nodelay;
        client_max_body_size 50m;
        proxy_pass http://utils-service;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Error pages
    error_page 502 503 504 /5xx.html;
    location = /5xx.html {
        internal;
        return 200 "Service temporarily unavailable. Please try again.";
        add_header Content-Type text/plain;
    }
}
